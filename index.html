<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>Racing</title>
	<style>
		body { margin: 0; overflow: hidden; background: #000; }
		canvas { display: block; touch-action: none; }
		#editor-link, #fullscreen-btn {
			position: absolute;
			bottom: 12px;
			color: #fff;
			font: 14px sans-serif;
			text-decoration: none;
			background: rgba(0,0,0,0.5);
			padding: 8px 14px;
			border-radius: 6px;
			z-index: 10;
			border: none;
			cursor: pointer;
		}
		#editor-link { right: 16px; }
		#fullscreen-btn { left: 16px; }
		#editor-link:hover, #fullscreen-btn:hover { background: rgba(0,0,0,0.7); }
		@media (pointer: coarse) {
			#editor-link { bottom: auto; top: 12px; right: 12px; }
			#fullscreen-btn { display: none; }
		}
	</style>
	<script type="importmap">
	{
		"imports": {
			"three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
			"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/",
			"crashcat": "https://esm.sh/crashcat@0.0.2"
		}
	}
	</script>
</head>
<body>
	<a id="editor-link" href="editor.html">Create your own track</a>
	<button id="fullscreen-btn">⛶ Fullscreen</button>
	<script>
		const map = new URLSearchParams( location.search ).get( 'map' );
		if ( map ) {
			const link = document.getElementById( 'editor-link' );
			link.href = 'editor.html?map=' + map;
			link.textContent = 'Edit this track';
		}

		const fsBtn = document.getElementById( 'fullscreen-btn' );
		fsBtn.addEventListener( 'click', () => {
			if ( !document.fullscreenElement ) {
				document.documentElement.requestFullscreen();
			} else {
				document.exitFullscreen();
			}
		} );
		document.addEventListener( 'fullscreenchange', () => {
			fsBtn.textContent = document.fullscreenElement ? '⛶ Exit Fullscreen' : '⛶ Fullscreen';
		} );
	</script>
	<script type="module" src="js/main.js"></script>
</body>
</html>
